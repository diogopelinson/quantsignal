services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.21.0
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - mlflow_data:/mlflow
    depends_on:
      mlflow:
        condition: service_healthy

volumes:
  mlflow_data: