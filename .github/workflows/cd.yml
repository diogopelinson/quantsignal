name: CD

on:
  push:
    branches: [master]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY_URL: ${{ secrets.ECR_REPOSITORY_URL }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REPOSITORY_URL:$IMAGE_TAG .
          docker build -t $ECR_REPOSITORY_URL:latest .
          docker push $ECR_REPOSITORY_URL:$IMAGE_TAG
          docker push $ECR_REPOSITORY_URL:latest

      - name: Output image URI
        run: echo "Image pushed to $ECR_REPOSITORY_URL:${{ github.sha }}"
      
      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region us-east-1 --name quantsignal-cluster

      - name: Deploy to EKS
        run: |
          kubectl set image deployment/quantsignal-app \
            app=${{ secrets.ECR_REPOSITORY_URL }}:${{ github.sha }}
          kubectl rollout status deployment/quantsignal-app