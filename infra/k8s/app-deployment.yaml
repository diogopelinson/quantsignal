apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantsignal-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantsignal-app
  template:
    metadata:
      labels:
        app: quantsignal-app
    spec:
      containers:
        - name: app
          image: quantsignal-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: quantsignal-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10