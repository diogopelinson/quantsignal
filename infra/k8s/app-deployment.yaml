apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantsignal-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantsignal-app
  template:
    metadata:
      labels:
        app: quantsignal-app
    spec:
      containers:
        - name: app
          image: 074654843027.dkr.ecr.us-east-1.amazonaws.com/quantsignal:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: quantsignal-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 15